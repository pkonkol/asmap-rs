[build]
target = "index.html"
dist = "../dist"

[[proxy]]
backend = "http://[::1]:8081/api/"

# Only install if needed - safe to run multiple times
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = [
    "-c",
    "test -f node_modules/.bin/tailwindcss || npm install @tailwindcss/cli",
]

# Build CSS only if output doesn't exist or source is newer
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = [
    "-c",
    "test css/output.css -nt css/tailwind.css && test css/output.css -nt tailwind.config.js || npx @tailwindcss/cli -c tailwind.config.js -i css/tailwind.css -o css/output.css",
]

[watch]
ignore = ["css/output.css", "node_modules/", "package-lock.json"]
