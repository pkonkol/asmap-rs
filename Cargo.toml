[package]
name = "asmap-rs"
version = "0.1.0"
description = "Interactive map of internet autonomous systems, organisations and persons"
edition = "2024"

[workspace]
members = [
    "asdb",
    "asdb-models",
    "asdb-builder",
    "config",
    "georesolve",
    "asmap/frontend",
    "asmap/server",
    "asmap/protocol",
    "test-context",
    "leaflet-markercluster",
]

[workspace.package]
edition = "2024"
authors = ["Piotr Konkol"]
repository = "https://github.com/pkonkol/asmap-rs"
license = "MIT"

[workspace.dependencies]
serde = "1.0"
serde_json = "1.0"
tokio = "1.33"
ipnetwork = "0.18"
mongodb = "2.7"
thiserror = "1.0"
csv = "1.3"
indicatif = "0.17"
clap = { version = "4.4", features = ["derive"] }
log = "0.4"
anyhow = "1.0"
bincode = "1.3"
futures = "0.3"
itertools = "0.11"
leaflet = "0.2"
rand = "0.8"
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = "0.3"

[dependencies]
asdb-builder = { version = "0.1", path = "asdb-builder" }
asdb-models = { version = "0.1", path = "asdb-models" }
asdb = { version = "0.1", path = "asdb" }
config = { path = "config" }
clap = { workspace = true }
indicatif = { workspace = true }
csv = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
